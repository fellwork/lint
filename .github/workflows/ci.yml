name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install proto + pinned tools (bun, node, moon)
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install dependencies (incl. biome)
        run: bun install --frozen-lockfile

      - name: Run CI tasks
        run: moon run :ci
